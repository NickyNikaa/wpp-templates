let chM,chD;
function render(){
  const cut=document.getElementById("cut").value; if(!cut)return;
  const cm=+cut.slice(5,7), cd=+cut.slice(8,10);
  const M=monthly(cm,cd);
  const ytd26=sumYTD(DATA.d2026,cm,cd), ytd25=sumYTD(DATA.d2025,cm,cd);
  const yoy=ytd25?(ytd26-ytd25)/ytd25*100:null;
  const corr=realizedCorrection(cut);
  const realPct=ytd26/T26*100, adjPct=(ytd26+corr)/T26*100, prevPct=ytd25/T25*100;
  const dReal=realPct-prevPct, dAdj=adjPct-prevPct;

  document.getElementById("meta").textContent=`Vorjahresvergleich 01.01.–${deDate(cut)} (taggleich) · exkl. Payback (426667+469409) · Datenstand ${deDate(today)}`;

  // KPIs
  document.getElementById("kpis").innerHTML=`
    <div class="kpi"><div class="l">YTD 2026</div><div class="v">${eur(ytd26)}</div><div class="d ${yoy>=0?'pos':'neg'}">${yoy!=null?pf(yoy)+" YoY":""}</div></div>
    <div class="kpi"><div class="l">Vorjahr (2025)</div><div class="v">${eur(ytd25)}</div><div class="d" style="color:var(--muted)">taggleich</div></div>
    <div class="kpi"><div class="l">Zielerreichung 2026 (bereinigt)</div><div class="v">${adjPct.toLocaleString("de-DE",{maximumFractionDigits:1})} %</div><div class="d ${dAdj>=0?'pos':'neg'}">${ppf(dAdj)} vs. VJ</div></div>`;

  // Pacing
  document.getElementById("paceSub").textContent=`Zielerreichung zum ${deDate(cut)} · Ziel 2026 ${mio(T26)} · Ziel 2025 ${mio(T25)} · 2026-Ziel liegt ${(((T26/T25)-1)*100).toFixed(0)} % über Vorjahr`;
  const bar=(lbl,pct,cap,col)=>{const w=Math.max(0,Math.min(100,pct));
    return `<div class="pacebar"><div class="top"><span style="font-weight:600">${lbl}</span><span style="font-weight:700;color:${col}">${pct.toLocaleString("de-DE",{maximumFractionDigits:1})} %</span></div>
      <div class="track"><div class="fill" style="width:${w}%;background:${col}"></div></div><div class="cap">${cap}</div></div>`;};
  document.getElementById("pace").innerHTML=
    bar("2026 real",realPct,`${mio(ytd26)} von ${mio(T26)}`,"#0a4d8c")+
    bar("2026 tracking-bereinigt",adjPct,`+${mio(corr)} Korrektur (${DATA.corr.note})`,"#2563b0")+
    bar("2025 zum gleichen Stichtag",prevPct,`${mio(ytd25)} von ${mio(T25)}`,"#9aa3ad");
  const vcol=dAdj>=0?"var(--pos)":"var(--neg)";
  document.getElementById("verdict").innerHTML=`<b>Pace-Fazit:</b> 2026 liegt <b style="color:${vcol}">${ppf(dAdj)}</b> ${dAdj>=0?"vor":"hinter"} Vorjahr (tracking-bereinigt), real ${ppf(dReal)}. Tracking-Korrektur 2026: einmalig bis ${mio(DATA.corr.amount)} (linear 20.04.→31.05., ab Juni keine neuen Verluste).`;

  // Monthly chart
  const labels=MONTHS.slice(0,cm);
  if(chM)chM.destroy();
  chM=new Chart(document.getElementById("chMonth"),{type:"bar",
    data:{labels,datasets:[
      {label:"2025",data:M.prev,backgroundColor:"#c0c6cf",borderRadius:3},
      {label:"2026",data:M.cur,backgroundColor:"#0a4d8c",borderRadius:3}]},
    options:{responsive:true,plugins:{legend:{position:"bottom"},
      tooltip:{callbacks:{label:c=>c.dataset.label+": "+eur(c.parsed.y)}}},
      scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>new Intl.NumberFormat("de-DE",{notation:"compact"}).format(v)+" €"},grid:{color:"#eef1f5"}}}}});

  // Daily cumulative chart
  const D=cumulativeDaily(cm,cd);
  document.getElementById("dailySub").textContent=`Kumuliert ab 01.01. bis ${deDate(cut)} · 2025 vs. 2026 (taggleich) · exkl. Payback`;
  if(chD)chD.destroy();
  chD=new Chart(document.getElementById("chDaily"),{type:"line",
    data:{labels:D.labels,datasets:[
      {label:"2025 kumuliert",data:D.c25,borderColor:"#9aa3ad",backgroundColor:"#9aa3ad",borderWidth:2,pointRadius:0,tension:.15},
      {label:"2026 kumuliert",data:D.c26,borderColor:"#0a4d8c",backgroundColor:"#0a4d8c",borderWidth:2,pointRadius:0,tension:.15}]},
    options:{responsive:true,interaction:{mode:"index",intersect:false},
      plugins:{legend:{position:"bottom"},tooltip:{callbacks:{label:c=>c.dataset.label+": "+eur(c.parsed.y)}}},
      scales:{x:{ticks:{maxTicksLimit:12,color:"#6b7280"},grid:{display:false}},
        y:{ticks:{callback:v=>new Intl.NumberFormat("de-DE",{notation:"compact"}).format(v)+" €"},grid:{color:"#eef1f5"}}}}});

  // Table
  document.getElementById("hPrev").textContent="2025";
  document.getElementById("hCur").textContent="2026";
  const tb=document.getElementById("tb");tb.innerHTML="";
  for(let i=0;i<cm;i++){const a=M.prev[i],b=M.cur[i],d=a?(b-a)/a*100:null,partial=(i+1===cm);
    tb.insertAdjacentHTML("beforeend",`<tr><td>${MF[i]}${partial?` (bis ${cd}.)`:""}</td><td>${eur(a)}</td><td>${eur(b)}</td><td class="${d==null?'':(d>=0?'pos':'neg')}">${d==null?"–":pf(d)}</td></tr>`);}
  tb.insertAdjacentHTML("beforeend",`<tr class="ytd"><td>YTD 01.01.–${deDate(cut)}</td><td>${eur(ytd25)}</td><td>${eur(ytd26)}</td><td class="${yoy>=0?'pos':'neg'}">${yoy!=null?pf(yoy):"–"}</td></tr>`);
  document.getElementById("foot").innerHTML="Umsatz = AWIN-Transaktionen, netto (Stornos rausgerechnet), exkl. Payback DE (426667) + AT (469409). Laufender Monat taggleich gegen Vorjahr.";

  window._S={cut,cm,cd,M,D,ytd26,ytd25,yoy,corr,realPct,adjPct,prevPct,dReal,dAdj};
}

function dlPng(){ if(chM){const a=document.createElement("a");a.href=chM.toBase64Image("image/png",1);a.download="MeinSchiff_9127_Monatsumsatz.png";a.click();}
  if(chD){const b=document.createElement("a");b.href=chD.toBase64Image("image/png",1);b.download="MeinSchiff_9127_Tagesbasis.png";setTimeout(()=>b.click(),300);} }

function dlPptx(){
  const S=window._S; if(!S)return;
  const NAVY="0F3A5F",CUR="0A4D8C",PREV="C0C6CF",MUT="5A6B80",POS="16A34A",NEG="DC2626",ADJ="2563B0",LINE="E3E9F0";
  const p=new PptxGenJS(); p.layout="LAYOUT_WIDE"; p.author="WPP Media";
  const stich=deDate(S.cut), cmN=MF[S.cm-1];
  // S1 Title
  let s=p.addSlide(); s.background={color:NAVY};
  s.addShape(p.ShapeType.rect,{x:0,y:0,w:0.35,h:7.5,fill:{color:"2EA3F2"}});
  s.addText("AFFILIATE PERFORMANCE · AWIN",{x:0.9,y:1.8,w:11,h:0.4,fontFace:"Trebuchet MS",fontSize:14,color:"2EA3F2",charSpacing:3,bold:true});
  s.addText("Mein Schiff DACH (9127)",{x:0.85,y:2.25,w:11.5,h:1.0,fontFace:"Georgia",fontSize:44,color:"FFFFFF",bold:true});
  s.addText("Year-over-Year 2026 vs. 2025 · Umsatz exkl. Payback",{x:0.9,y:3.35,w:11.5,h:0.6,fontFace:"Calibri",fontSize:22,color:"CADCFC"});
  s.addText(`Stichtag: 01.01.–${stich}   ·   Datenstand ${deDate(today)}`,{x:0.9,y:5.9,w:11.5,h:0.5,fontFace:"Calibri",fontSize:13,color:"8FA6C4"});
  // S2 Monthly chart + YTD box
  s=p.addSlide(); s.background={color:"FFFFFF"};
  s.addText(`Monatsumsatz — 2025 vs. 2026 (Jan–${cmN})`,{x:0.6,y:0.45,w:9,h:0.6,fontFace:"Georgia",fontSize:24,color:NAVY,bold:true});
  s.addChart(p.ChartType.bar,[{name:"2025",labels:MONTHS.slice(0,S.cm),values:S.M.prev},{name:"2026",labels:MONTHS.slice(0,S.cm),values:S.M.cur}],
    {x:0.5,y:1.5,w:8.7,h:5.3,barDir:"col",chartColors:[PREV,CUR],chartArea:{fill:{color:"FFFFFF"}},
     catAxisLabelColor:MUT,valAxisLabelColor:MUT,valGridLine:{color:LINE,size:0.5},catGridLine:{style:"none"},
     showLegend:true,legendPos:"b",legendColor:NAVY});
  s.addShape(p.ShapeType.rect,{x:9.5,y:1.5,w:3.2,h:4.4,fill:{color:"F2F5F8"},line:{color:PREV,width:1}});
  const yoyTxt=S.yoy!=null?((S.yoy>=0?"+":"−")+Math.abs(S.yoy).toFixed(1).replace(".",",")+" % YoY"):"–";
  s.addText([
    {text:`YTD 2026 (bis ${stich})`,options:{fontSize:13,bold:true,color:MUT,breakLine:true}},
    {text:eur(S.ytd26),options:{fontSize:24,bold:true,color:CUR,breakLine:true}},
    {text:yoyTxt,options:{fontSize:17,bold:true,color:S.yoy>=0?POS:NEG,breakLine:true}},
    {text:" ",options:{fontSize:8,breakLine:true}},
    {text:"Vorjahr (2025): "+eur(S.ytd25),options:{fontSize:13,color:MUT,breakLine:true}},
    {text:"Payback (DE+AT) herausgerechnet.",options:{fontSize:10,color:MUT}},
  ],{x:9.7,y:1.75,w:2.85,h:3.9,fontFace:"Calibri",valign:"top"});
  // S3 Daily cumulative line
  s=p.addSlide(); s.background={color:"FFFFFF"};
  s.addText(`Kumulierter Umsatz auf Tagesbasis — 2025 vs. 2026 (bis ${stich})`,{x:0.6,y:0.45,w:12,h:0.6,fontFace:"Georgia",fontSize:22,color:NAVY,bold:true});
  // downsample für PPTX (max ~80 Punkte)
  const step=Math.max(1,Math.ceil(S.D.labels.length/80));
  const dl=[],d25=[],d26=[];
  for(let i=0;i<S.D.labels.length;i+=step){dl.push(S.D.labels[i]);d25.push(Math.round(S.D.c25[i]));d26.push(Math.round(S.D.c26[i]));}
  s.addChart(p.ChartType.line,[{name:"2025 kumuliert",labels:dl,values:d25},{name:"2026 kumuliert",labels:dl,values:d26}],
    {x:0.5,y:1.4,w:12.3,h:5.4,chartColors:["9AA3AD",CUR],lineSize:2.5,lineSmooth:true,
     chartArea:{fill:{color:"FFFFFF"}},catAxisLabelColor:MUT,catAxisLabelFontSize:8,valAxisLabelColor:MUT,
     valGridLine:{color:LINE,size:0.5},showLegend:true,legendPos:"b",legendColor:NAVY});
  // S4 Zielpacing
  s=p.addSlide(); s.background={color:"FFFFFF"};
  s.addText("Zielpacing (exkl. Payback)",{x:0.6,y:0.45,w:12,h:0.6,fontFace:"Georgia",fontSize:24,color:NAVY,bold:true});
  s.addText(`Zielerreichung zum ${stich} · Ziel 2026 ${mio(T26)} · Ziel 2025 ${mio(T25)} · 2026-Ziel ${(((T26/T25)-1)*100).toFixed(0)} % über Vorjahr`,
    {x:0.6,y:1.15,w:12,h:0.4,fontFace:"Calibri",fontSize:13,color:MUT});
  const pbar=(idx,lbl,pct,cap,col)=>{const y=1.8+idx*1.35;
    s.addText(lbl,{x:0.6,y,w:6,h:0.4,fontFace:"Calibri",fontSize:15,bold:true,color:NAVY});
    s.addText(pct.toLocaleString("de-DE",{maximumFractionDigits:1})+" %",{x:10.5,y,w:2.2,h:0.4,fontFace:"Calibri",fontSize:16,bold:true,color:col,align:"right"});
    s.addShape(p.ShapeType.rect,{x:0.6,y:y+0.45,w:12.1,h:0.32,fill:{color:"E3E8EE"}});
    s.addShape(p.ShapeType.rect,{x:0.6,y:y+0.45,w:Math.max(0.02,12.1*Math.min(100,pct)/100),h:0.32,fill:{color:col}});
    s.addText(cap,{x:0.6,y:y+0.82,w:12,h:0.35,fontFace:"Calibri",fontSize:11,color:MUT});};
  pbar(0,"2026 real",S.realPct,`${mio(S.ytd26)} von ${mio(T26)}`,CUR);
  pbar(1,"2026 tracking-bereinigt",S.adjPct,`+${mio(S.corr)} Tracking-Korrektur · ${DATA.corr.note}`,ADJ);
  pbar(2,"2025 zum gleichen Stichtag",S.prevPct,`${mio(S.ytd25)} von ${mio(T25)}`,"9AA3AD");
  const vcol=S.dAdj>=0?POS:NEG;
  s.addText([
    {text:"Pace-Fazit: ",options:{bold:true,color:NAVY}},
    {text:`2026 liegt ${ppf(S.dAdj)} ${S.dAdj>=0?"vor":"hinter"} Vorjahr (bereinigt), real ${ppf(S.dReal)}.`,options:{color:vcol,bold:true}},
  ],{x:0.6,y:6.2,w:12,h:0.5,fontFace:"Calibri",fontSize:14});
  s.addText("Tracking-Korrektur 2026: einmalig bis 1,13 Mio € für dokumentierte Ausfälle (Cashback/Voucher-Cluster, Standardlink-Defekt ab 20.04.). Ab Juni keine neuen Verluste eingeplant. Ziele exkl. Payback.",
    {x:0.6,y:6.7,w:12,h:0.5,fontFace:"Calibri",fontSize:9,color:"95A3B6"});

  p.writeFile({fileName:`MeinSchiff_9127_YoY_bis_${S.cut}.pptx`});
}

(function(){
  const cutEl=document.getElementById("cut");
  cutEl.min="2026-01-01"; cutEl.max=today; cutEl.value=today;
  cutEl.addEventListener("change",render);
  const q=[["Ende Q1","2026-03-31"],["Ende Apr","2026-04-30"],["Ende Mai","2026-05-31"],["Heute",today]];
  const qd=document.getElementById("quick");
  q.forEach(([l,v])=>{if(v<=today){const b=document.createElement("button");b.textContent=l;b.onclick=()=>{cutEl.value=v;render();};qd.appendChild(b);}});
  render();
})();
</script>
