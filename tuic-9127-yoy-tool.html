function compute(cut){
  const cm=+cut.slice(5,7), cd=+cut.slice(8,10);
  const rows=[]; let ytd25=0, ytd26=0;
  for(let m=1;m<=cm;m++){
    const mm=String(m).padStart(2,"0");
    let s25=0,s26=0;
    for(const k in DATA.d2025){ if(k.slice(0,2)===mm){ const dd=+k.slice(3,5); if(m<cm||dd<=cd) s25+=DATA.d2025[k]; } }

    const idx=(s25>0&&s26>0)? s26/s25*100 : null;
    rows.push({m,label:M[m-1],idx,partial:m===cm});
    ytd25+=s25; ytd26+=s26;
  }
  const ytdIdx = ytd25>0? ytd26/ytd25*100 : null;
  return {rows,ytdIdx,cm,cd,cut};

      tooltip:{callbacks:{label:c=>{const r=R.rows[c.dataIndex]; return r.idx==null?"–":"Index "+nf1(r.idx)+"  ("+pf(r.idx-100)+")";}}}},
      scales:{x:{grid:{display:false},ticks:{color:"#6b7280"}},
        y:{grid:{color:"#e5e7eb"},ticks:{color:"#6b7280"},title:{display:true,text:"Index (Vorjahr = 100)",color:"#6b7280"}}}},
    plugins:[{id:"bl",afterDraw(c){const y=c.scales.y.getPixelForValue(100);const{left,right}=c.chartArea,x=c.ctx;
      x.save();x.strokeStyle="#94a3b8";x.setLineDash([5,4]);x.beginPath();x.moveTo(left,y);x.lineTo(right,y);x.stroke();
      x.setLineDash([]);x.fillStyle="#94a3b8";x.font="11px sans-serif";x.fillText("100 = Vorjahr",left+6,y-5);x.restore();}}]
  });
  window._R=R;
}

function dlPng(){ if(chart){const a=document.createElement("a");a.href=chart.toBase64Image("image/png",1);a.download="MeinSchiff_9127_YoY_Index.png";a.click();} }

function dlPptx(){
  const R=window._R; if(!R) return;
  const NAVY="0F3A5F",ACC="2EA3F2",SLATE="6B7F9E",MUT="5A6B80",POS="16A34A",NEG="DC2626",LINE="E3E9F0";
  const p=new PptxGenJS(); p.layout="LAYOUT_WIDE"; p.author="WPP Media";
  const stich=deDate(R.cut);
  // S1 Title
  let s=p.addSlide(); s.background={color:NAVY};
  s.addShape(p.ShapeType.rect,{x:0,y:0,w:0.35,h:7.5,fill:{color:ACC}});
  s.addText("AFFILIATE PERFORMANCE · AWIN (INDEXIERT)",{x:0.9,y:1.8,w:11,h:0.4,fontFace:"Trebuchet MS",fontSize:14,color:ACC,charSpacing:3,bold:true});
  s.addText("Mein Schiff DACH (9127)",{x:0.85,y:2.25,w:11.5,h:1.0,fontFace:"Georgia",fontSize:44,color:"FFFFFF",bold:true});
  s.addText("Year-over-Year · Vorjahresperiode = 100 · exkl. Payback (netto)",{x:0.9,y:3.35,w:11.5,h:0.6,fontFace:"Calibri",fontSize:22,color:"CADCFC"});
  s.addText(`Stichtag: Jan–${stich}   ·   Datenstand ${deDate(today)}`,{x:0.9,y:5.9,w:11.5,h:0.5,fontFace:"Calibri",fontSize:13,color:"8FA6C4"});
  // S2 Chart
  s=p.addSlide(); s.background={color:"FFFFFF"};
  s.addText(`Index nach Monat (VJ = 100) — Jan–${stich}`,{x:0.6,y:0.45,w:12,h:0.6,fontFace:"Georgia",fontSize:24,color:NAVY,bold:true});
  const labels=R.rows.map(r=>r.label), vals=R.rows.map(r=>r.idx==null?null:Math.round(r.idx*10)/10);
  s.addChart(p.ChartType.bar,[{name:"Index (VJ=100)",labels,values:vals}],{
    x:0.5,y:1.3,w:12.3,h:5.0,barDir:"col",chartColors:[ACC],chartArea:{fill:{color:"FFFFFF"}},
    catAxisLabelColor:MUT,valAxisLabelColor:MUT,valGridLine:{color:LINE,size:0.5},catGridLine:{style:"none"},
    showLegend:false,showValue:true,dataLabelPosition:"outEnd",dataLabelColor:"1E293B",dataLabelFontSize:9,
    valAxisMinVal:0});
  s.addText("Index 100 = Vorjahresniveau. Laufender Monat taggleich verglichen.",{x:0.6,y:6.55,w:12,h:0.4,fontFace:"Calibri",fontSize:11,italic:true,color:MUT});
  // S3 Table
  s=p.addSlide(); s.background={color:"FFFFFF"};
  s.addText("Monatsdetail (indexiert)",{x:0.6,y:0.45,w:12,h:0.6,fontFace:"Georgia",fontSize:24,color:NAVY,bold:true});
  const hd=t=>({text:t,options:{fill:{color:NAVY},color:"FFFFFF",bold:true,fontSize:13,align:t==="Monat"?"left":"right",valign:"middle"}});
  const rows=[[hd("Monat"),hd("Index (VJ=100)"),hd("Δ YoY")]];
  const cell=(t,a,c,b)=>({text:t,options:{align:a,fontSize:13,color:c||"333333",bold:!!b}});
  R.rows.forEach(r=>{const d=r.idx!=null?r.idx-100:null;
    rows.push([cell(MF[r.m-1]+(r.partial?` (bis ${R.cd}.)`:""),"left",NAVY),
      cell(r.idx!=null?nf1(r.idx):"–","right"),
      cell(d==null?"–":pf(d),"right",d==null?MUT:(d>=0?POS:NEG),true)]);});
  const yd=R.ytdIdx!=null?R.ytdIdx-100:null;
  rows.push([{text:`YTD Jan–${stich}`,options:{align:"left",bold:true,fontSize:13,color:NAVY,fill:{color:"EAF1FB"}}},
    {text:R.ytdIdx!=null?nf1(R.ytdIdx):"–",options:{align:"right",bold:true,fontSize:13,fill:{color:"EAF1FB"}}},
    {text:yd!=null?pf(yd):"–",options:{align:"right",bold:true,fontSize:13,color:yd>=0?POS:NEG,fill:{color:"EAF1FB"}}}]);
  s.addTable(rows,{x:0.6,y:1.3,w:8.5,colW:[3.3,2.8,2.4],rowH:0.45,border:{type:"solid",pt:0.5,color:LINE},valign:"middle",fontFace:"Calibri"});
  // Take-aways box
  const valid=R.rows.filter(r=>r.idx!=null);
  const best=valid.reduce((a,b)=>b.idx>a.idx?b:a,valid[0]);
  const worst=valid.reduce((a,b)=>b.idx<a.idx?b:a,valid[0]);
  s.addShape(p.ShapeType.rect,{x:9.4,y:1.3,w:3.3,h:4.4,fill:{color:"F4F7FB"},line:{color:LINE,width:1}});
  s.addText("Auf einen Blick",{x:9.6,y:1.5,w:3,h:0.4,fontFace:"Trebuchet MS",fontSize:12,color:MUT,charSpacing:2,bold:true});
  s.addText([
    {text:`YTD: ${yd>=0?"+":"−"}${Math.abs(yd).toFixed(1).replace(".",",")} %`,options:{bold:true,color:yd>=0?POS:NEG,breakLine:true,fontSize:16}},
    {text:"vs. Vorjahresperiode",options:{color:MUT,breakLine:true,fontSize:12}},
    {text:" ",options:{breakLine:true,fontSize:8}},
    {text:`Bester Monat: ${MF[best.m-1]}`,options:{bold:true,color:POS,breakLine:true}},
    {text:`Index ${nf1(best.idx)}`,options:{color:MUT,breakLine:true,fontSize:12}},
    {text:" ",options:{breakLine:true,fontSize:8}},
    {text:`Schwächster: ${MF[worst.m-1]}`,options:{bold:true,color:NEG,breakLine:true}},
    {text:`Index ${nf1(worst.idx)}`,options:{color:MUT,fontSize:12}},
  ],{x:9.6,y:2.0,w:3,h:3.4,fontFace:"Calibri",fontSize:14,lineSpacingMultiple:1.05});
  s.addText("Methodik: AWIN-Transaktionen, netto (Stornos raus), exkl. Payback (426667+469409). Indexiert, keine absoluten Werte.",
    {x:0.6,y:6.7,w:12,h:0.4,fontFace:"Calibri",fontSize:9,color:"95A3B6"});

  p.writeFile({fileName:`MeinSchiff_9127_YoY_indexiert_bis_${R.cut}.pptx`});
}
